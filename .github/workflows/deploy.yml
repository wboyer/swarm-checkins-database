name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Debug secret presence
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          if [ -z "$AZURE_CLIENT_ID" ]; then echo "AZURE_CLIENT_ID is missing or empty"; else echo "AZURE_CLIENT_ID is set (length: ${#AZURE_CLIENT_ID})"; fi
          if [ -z "$AZURE_CLIENT_SECRET" ]; then echo "AZURE_CLIENT_SECRET is missing or empty"; else echo "AZURE_CLIENT_SECRET is set (length: ${#AZURE_CLIENT_SECRET})"; fi
          if [ -z "$AZURE_TENANT_ID" ]; then echo "AZURE_TENANT_ID is missing or empty"; else echo "AZURE_TENANT_ID is set (length: ${#AZURE_TENANT_ID})"; fi
          if [ -z "$AZURE_SUBSCRIPTION_ID" ]; then echo "AZURE_SUBSCRIPTION_ID is missing or empty"; else echo "AZURE_SUBSCRIPTION_ID is set (length: ${#AZURE_SUBSCRIPTION_ID})"; fi

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: "{\"clientId\":\"${{ secrets.AZURE_CLIENT_ID }}\",\"clientSecret\":\"${{ secrets.AZURE_CLIENT_SECRET }}\",\"subscriptionId\":\"${{ secrets.AZURE_SUBSCRIPTION_ID }}\",\"tenantId\":\"${{ secrets.AZURE_TENANT_ID }}\"}"

      - name: Deploy infrastructure
        run: |
          ACR_LOGIN_SERVER=$(az deployment group create \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --parameters foursquareToken=${{ secrets.FOURSQUARE_TOKEN }} \
            --parameters postgresAdminPassword=${{ secrets.POSTGRES_ADMIN_PASSWORD }} \
            --parameters imageTag=${{ github.sha }} \
            --query properties.outputs.acrLoginServer.value --output tsv)
          echo "ACR_LOGIN_SERVER=$ACR_LOGIN_SERVER" >> $GITHUB_ENV

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_LOGIN_SERVER }}

      - name: Build and push image
        run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/swarm-checkins-database-sync
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Update job images
        run: |
          IMAGE=${{ env.ACR_LOGIN_SERVER }}/swarm-checkins-database-sync
          az containerapp job update \
            --name migrate \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image $IMAGE:${{ github.sha }}
          az containerapp job update \
            --name sync \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image $IMAGE:${{ github.sha }}

      - name: Run migrations
        run: |
          EXECUTION=$(az containerapp job start \
            --name migrate \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query name --output tsv)

          echo "Migration execution: $EXECUTION"

          while true; do
            STATUS=$(az containerapp job execution show \
              --name migrate \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --job-execution-name "$EXECUTION" \
              --query properties.status --output tsv)
            echo "Status: $STATUS"
            case "$STATUS" in
              Succeeded) echo "Migrations complete."; break ;;
              Failed|Stopped) echo "Migration failed."; exit 1 ;;
              *) sleep 5 ;;
            esac
          done

      - name: Run sync
        run: |
          az containerapp job start \
            --name sync \
            --resource-group ${{ vars.RESOURCE_GROUP }}
